apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-api
  labels:
    app: pulse-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: pulse-api
  template:
    metadata:
      labels:
        app: pulse-api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: pulse-api-config
            - secretRef:
                name: {{ .Values.api.secretName }}
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-api-svc
spec:
  selector:
    app: pulse-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pulse-api-config
data:
  NODE_ENV: {{ .Values.api.config.NODE_ENV | quote }}
  PORT: {{ .Values.api.config.PORT | quote }}
  CLIENT_ORIGIN: {{ .Values.api.config.CLIENT_ORIGIN | quote }}
  RATE_LIMIT_WINDOW_MS: {{ .Values.api.config.RATE_LIMIT_WINDOW_MS | quote }}
  RATE_LIMIT_MAX_REQUESTS: {{ .Values.api.config.RATE_LIMIT_MAX_REQUESTS | quote }}
