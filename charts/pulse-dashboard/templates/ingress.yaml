{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-api-ingress
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tlsIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - {{ .Values.ingress.apiHost }}
      secretName: pulse-api-tls
  rules:
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-api-svc
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-web-ingress
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tlsIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - {{ .Values.ingress.webHost }}
      secretName: pulse-web-tls
  rules:
    - host: {{ .Values.ingress.webHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-web-svc
                port:
                  number: 80
{{- end }}
