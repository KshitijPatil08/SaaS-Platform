apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-web
  labels:
    app: pulse-web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: pulse-web
  template:
    metadata:
      labels:
        app: pulse-web
    spec:
      containers:
        - name: web
          image: {{ .Values.web.image }}
          ports:
            - containerPort: 80
          resources:
{{ toYaml .Values.web.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-web-svc
spec:
  selector:
    app: pulse-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
