# Default values for the pulse-dashboard Helm chart.
# Override in your own values.yaml for each client deployment.

api:
  image: your-registry/pulse-api:latest
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Secrets are injected from an existing Kubernetes secret named below.
  secretName: pulse-api-secrets
  config:
    NODE_ENV: production
    PORT: "5000"
    CLIENT_ORIGIN: "https://app.yourdomain.com"
    RATE_LIMIT_WINDOW_MS: "60000"
    RATE_LIMIT_MAX_REQUESTS: "100"

web:
  image: your-registry/pulse-web:latest
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: true
  webHost: app.yourdomain.com
  apiHost: api.yourdomain.com
  tlsIssuer: letsencrypt-prod

# No bundled DB — client must provide their own PostgreSQL (Option 2/3).
# The connection string lives in the pulse-api-secrets secret as DATABASE_URL.
