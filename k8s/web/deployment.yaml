apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-web
  labels:
    app: pulse-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulse-web
  template:
    metadata:
      labels:
        app: pulse-web
    spec:
      containers:
        - name: web
          image: your-registry/pulse-web:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
