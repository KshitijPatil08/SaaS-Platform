apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-web-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - app.yourdomain.com
      secretName: pulse-web-tls
  rules:
    - host: app.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-web-svc
                port:
                  number: 80
