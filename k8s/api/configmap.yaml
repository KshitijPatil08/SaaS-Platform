apiVersion: v1
kind: ConfigMap
metadata:
  name: pulse-api-config
data:
  NODE_ENV: "production"
  PORT: "5000"
  CLIENT_ORIGIN: "https://your-client-domain.com"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  LOG_LEVEL: "info"
  # PostgreSQL is managed by the client — only the URL is injected via secret
  DATABASE_URL: "postgresql://pulse_user:CHANGE_ME@client-rds:5432/pulse"
