apiVersion: v1
kind: Secret
metadata:
  name: pulse-api-secrets
type: Opaque
stringData:
  # Generate these with: openssl rand -base64 32
  JWT_SECRET: "REPLACE_WITH_GENERATED_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_GENERATED_REFRESH_SECRET"
  COOKIE_SECRET: "REPLACE_WITH_GENERATED_COOKIE_SECRET"
  # Client-managed PostgreSQL credentials (Option 2 / Option 3)
  DATABASE_URL: "postgresql://pulse_user:REPLACE_ME@client-rds:5432/pulse"
  # Stripe keys (from client's Stripe dashboard)
  STRIPE_SECRET_KEY: "sk_live_REPLACE"
  STRIPE_WEBHOOK_SECRET: "whsec_REPLACE"
  # Optional integrations
  MIXPANEL_TOKEN: "REPLACE_IF_USED"
  REDIS_URL: "redis://pulse-redis:6379"
