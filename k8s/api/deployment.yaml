apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-api
  labels:
    app: pulse-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pulse-api
  template:
    metadata:
      labels:
        app: pulse-api
    spec:
      containers:
        - name: api
          image: your-registry/pulse-api:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: pulse-api-config
            - secretRef:
                name: pulse-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      securityContext:
        fsGroup: 1000
